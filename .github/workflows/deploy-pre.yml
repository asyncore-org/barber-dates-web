name: Deploy Preview (PRE)

on:
  push:
    branches-ignore: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run lint

      - run: pnpm run type-check

      - run: pnpm run test:run

  deploy-preview:
    name: Deploy to Vercel PRE
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build
        env:
          VITE_INSFORGE_URL: ${{ secrets.INSFORGE_URL_PRE }}
          VITE_INSFORGE_ANON_KEY: ${{ secrets.INSFORGE_ANON_KEY_PRE }}
          VITE_APP_ENV: preview

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PRE }}
          working-directory: ./
